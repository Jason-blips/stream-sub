<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时字幕</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 20px; font-family: "Segoe UI", system-ui, sans-serif; background: #1a1a1e; color: #e4e4e7; min-height: 100vh; }
    h1 { font-size: 20px; margin: 0 0 4px 0; font-weight: 600; }
    .sub { font-size: 13px; color: #71717a; margin-bottom: 20px; }
    .mode-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .mode-btn {
      flex: 1; padding: 16px; border: 2px solid #3f3f46; border-radius: 10px;
      background: #27272a; color: #e4e4e7; font-size: 15px; cursor: pointer;
      transition: all 0.2s;
    }
    .mode-btn:hover { border-color: #6366f1; background: #2d2d32; }
    .mode-btn.selected { border-color: #6366f1; background: #6366f1; color: #fff; }
    .window-list { max-height: 120px; overflow-y: auto; background: #27272a; border-radius: 8px; padding: 6px; margin-bottom: 16px; display: none; }
    .window-list.visible { display: block; }
    .window-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; margin-bottom: 2px; }
    .window-item:hover { background: #3f3f46; }
    .window-item.selected { background: #6366f1; color: #fff; }
    .btn-start { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn-start.go { background: #6366f1; color: #fff; }
    .btn-start.go:hover { background: #4f46e5; }
    .btn-start.stop { background: #dc2626; color: #fff; }
    .subtitle-box { margin-top: 20px; padding: 16px; background: #27272a; border-radius: 10px; min-height: 80px; }
    .subtitle-box label { font-size: 11px; color: #71717a; }
    #subtitleText { font-size: 15px; line-height: 1.6; color: #e4e4e7; margin-top: 8px; white-space: pre-line; min-height: 24px; }
    .status { font-size: 12px; color: #71717a; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>实时字幕</h1>
  <p class="sub">电脑播放音频或麦克风说话，旁边持续显示字幕</p>

  <div class="mode-row">
    <button class="mode-btn selected" data-mode="mic">麦克风</button>
    <button class="mode-btn" data-mode="window">电脑播放窗口</button>
  </div>

  <div class="window-list" id="windowList"></div>

  <div style="margin-bottom:12px;">
    <label style="font-size:12px;color:#71717a;">字幕语言</label>
    <select id="targetLang" style="width:100%;padding:10px;background:#27272a;border:1px solid #3f3f46;border-radius:8px;color:#fff;font-size:14px;margin-top:4px;">
      <option value="zh">中文</option>
      <option value="en">English</option>
    </select>
  </div>

  <button class="btn-start go" id="startBtn">开始字幕</button>
  <div class="status" id="status"></div>

  <div class="subtitle-box">
    <label>字幕</label>
    <div id="subtitleText">等待中...</div>
  </div>
</body>
<script src="main.js"></script>
</html>
