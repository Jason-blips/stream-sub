<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会议实时字幕</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px; font-family: "Segoe UI", system-ui, sans-serif; background: #1a1a1e; color: #e4e4e7; min-height: 100vh; }
    h1 { font-size: 18px; margin: 0 0 8px 0; font-weight: 600; }
    .sub { font-size: 12px; color: #71717a; margin-bottom: 20px; }
    .section { margin-bottom: 18px; }
    label { display: block; font-size: 12px; color: #a1a1aa; margin-bottom: 6px; }
    select { width: 100%; padding: 12px; background: #27272a; border: 1px solid #3f3f46; border-radius: 8px; color: #fff; font-size: 14px; }
    select:focus { outline: none; border-color: #6366f1; }
    .source-list { max-height: 140px; overflow-y: auto; background: #27272a; border: 1px solid #3f3f46; border-radius: 8px; padding: 4px; }
    .source-item { padding: 10px; margin-bottom: 2px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .source-item:hover { background: #3f3f46; }
    .source-item.selected { background: #6366f1; color: #fff; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #4f46e5; }
    .btn-stop { background: #dc2626; color: #fff; }
    .status { font-size: 12px; color: #71717a; margin-top: 8px; }
    .subtitle-preview { margin-top: 16px; padding: 12px; background: #27272a; border-radius: 8px; min-height: 50px; }
    .subtitle-preview label { font-size: 11px; color: #71717a; }
    #subtitleText { font-size: 14px; color: #e4e4e7; margin-top: 6px; min-height: 20px; }
  </style>
</head>
<body>
  <h1>会议实时字幕</h1>
  <p class="sub">电脑播放音频时：选「播放窗口」+ 勾选「仅窗口音频」；或扬声器外放 +「仅麦克风」</p>

  <div class="section">
    <label>音频来源</label>
    <div class="source-list" id="sourceList">加载中...</div>
    <label class="checkbox-wrap" style="display:flex;align-items:center;margin-top:8px;cursor:pointer;">
      <input type="checkbox" id="windowAudioOnly" style="margin-right:8px;">
      <span style="font-size:12px;color:#a1a1aa;">仅窗口/屏幕音频（电脑播放时选此项，不混合麦克风）</span>
    </label>
    <p style="font-size:11px;color:#71717a;margin-top:6px;">流媒体（爱奇艺等）可能禁止共享音频，可试「仅麦克风」并把麦克风靠近扬声器</p>
  </div>

  <div class="section">
    <label>字幕显示语言</label>
    <select id="targetLang">
      <option value="zh">中文</option>
      <option value="en">English</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
    </select>
  </div>

  <div class="section">
    <button class="btn btn-primary" id="startBtn">开始字幕</button>
    <div class="status" id="status"></div>
    <div class="subtitle-preview">
      <label>字幕预览</label>
      <div id="subtitleText">等待字幕...</div>
    </div>
  </div>
</body>
<script src="main.js"></script>
</html>
